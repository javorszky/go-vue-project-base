version: 2
updates:
  # Keep GitHub Actions up to date
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ['*']

  # Keep Go dependencies up to date
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly

  # Keep frontend dependencies up to date
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
