name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 8 * * 1' # Mondays 08:00 UTC — catch newly disclosed CVEs

permissions:
  contents: read
  security-events: write

jobs:
  trivy:
    name: Trivy — vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy.sarif
          # Report all severities to code scanning; adjust branch-protection
          # rules in GitHub settings to decide which severities block merges.
          severity: CRITICAL,HIGH,MEDIUM,LOW
          exit-code: '0'

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4.35.2
        if: always()
        with:
          sarif_file: trivy.sarif
          category: trivy

  govulncheck:
    name: govulncheck — reachable Go CVEs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  zizmor:
    name: Zizmor — workflow security audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read # lets zizmor resolve action metadata for richer analysis
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: zizmorcore/zizmor-action@v0.5.3
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
